specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Lusha
providerId: lusha
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- Sales Intelligence
- B2B
- Enrichment
- Contact Data
- Prospecting
- Intent
- Rate Limiting
- Quotas
- Throttling
description: >-
  Lusha applies per-API-key rate limits and a monthly credit pool tied to the plan. The exact RPS
  thresholds are not published on the docs landing page; the OpenAPI spec returns 429 with rate-limit
  headers when exceeded.
notes: Per-key + plan-based credit pool; specific RPS not publicly documented on landing page.
sources:
- https://docs.lusha.com/apis
responseCodes:
  throttled: 429
limits:
- name: Per API key
  scope: account
  metric: requests
  limit: see provider documentation
  notes: Throttled with 429 responses; thresholds not published on landing page.
- name: Monthly credits
  scope: account
  metric: credits
  limit: plan-based
  notes: Each enrichment consumes credits from the plan's monthly pool.
policies:
- name: Backoff Strategy
  description: Honor 429 with exponential backoff and Retry-After.
- name: Bulk Endpoints
  description: Use bulk lookups when available to reduce per-call overhead.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
