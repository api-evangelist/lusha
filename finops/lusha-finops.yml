description: >-
  FOCUS-aligned FinOps profile for Lusha. Cost is driven by seat-based subscription plus monthly
  credit consumption. Optimize by matching seat tier to user roles and tracking credit-per-enrichment
  ratios; consolidate with overlapping vendors (Cognism, Apollo, ZoomInfo) at renewal.
notes: Seat + credits model; renewal-time optimization.
sources:
- https://www.lusha.com/pricing/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Lusha
serviceCategory: Sales Intelligence
billingModel:
  pricingCategory: Subscription + Credits
  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
  - Subscription
  - Usage
focusColumns:
  ServiceName: Lusha API
  ServiceCategory: Sales Intelligence
  ProviderName: Lusha
  PublisherName: Lusha
  InvoiceIssuerName: Lusha
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
- name: seats
  description: Active user seats.
  unit: seat-month
  aggregation: max
  dimensions:
  - team
- name: credits_consumed
  description: Enrichment credits used.
  unit: credit
  aggregation: sum
  dimensions:
  - api
  - endpoint
principles:
- name: Visibility
  description: Pull monthly credit consumption from the dashboard; reconcile against contract.
- name: Allocation
  description: Allocate seats and credits to consuming revenue teams.
- name: Optimization
  description: Right-size seat tier; cache enrichments to avoid double-charging on dedupe.
- name: Accountability
  description: RevOps owns the contract; admin controls credit-pool reset cadence.
maintainers:
