specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Lusha
providerId: lusha
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Sales Intelligence
- B2B
- Enrichment
- Contact Data
- Prospecting
- Intent
- FinOps
- Cost Management
